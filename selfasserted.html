<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Agilean</title>
  <!--
    Página custom do Azure AD B2C para as telas SelfAsserted (reset de senha: verificação de
    email, nova senha; e afins). Diferente de unified.html: aqui o TÍTULO é dinâmico (vem do
    B2C — "Detalhes do Usuário", "Nova senha") então NÃO escondemos .heading/.intro.
    O B2C injeta o formulário em <div id="api">. Scripts custom não executam.
    Requisitos: HTTPS + CORS (allow b2clogin.com). DÉBITO: migrar pra blob/CDN.
  -->
  <style>
    :root {
      --brand-99: #FFF6EF;
      --brand-95: #FFF0E6;
      --brand-90: #FEDBC6;
      --brand-50: #FD7236;
      --brand-40: #F85D1A;
      --neutral-bg: #faf8f6;
      --neutral-text: #3d2e22;
      --neutral-text-muted: #5a4a3c;
      --neutral-subtle: #8c7a6b;
      --neutral-placeholder: #c4b5a5;
      --neutral-90: #e9e2db;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--neutral-text);
      background: linear-gradient(135deg, var(--brand-99), var(--brand-95));
    }

    /* Neutraliza o wrapper estreito/azul do template B2C */
    #panel, .container, [data-tenant-branding-background], [data-tenant-branding-background-color] {
      background: transparent !important;
      max-width: none !important;
      width: auto !important;
      box-shadow: none !important;
      border: none !important;
    }

    .agl-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .agl-card {
      width: 100%; max-width: 400px;
      background: #fff;
      border: 1px solid var(--neutral-90);
      border-radius: 18px;
      padding: 32px 32px 26px;
      box-shadow: 0 12px 40px rgba(61,46,34,0.10);
    }
    .agl-mark {
      width: 52px; height: 52px; margin: 0 auto 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand-50), var(--brand-40));
      box-shadow: 0 8px 24px rgba(253,114,54,0.28);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 24px;
    }

    /* ===== Elementos injetados pelo B2C em #api ===== */
    #api { width: 100%; }

    /* Título/instrução DINÂMICOS do B2C — mantidos e estilizados */
    #api .heading { text-align: center; margin-bottom: 6px; }
    #api .heading h1, #api .heading h2 {
      font-size: 21px; font-weight: 800; color: var(--neutral-text); margin: 0;
    }
    #api .intro, #api .intro p {
      text-align: center; font-size: 13.5px; color: var(--neutral-subtle);
      margin: 0 auto 22px; max-width: 320px; line-height: 1.5;
    }

    #api .attr, #api .entry, #api .entry-item { width: 100%; }
    #api .entry-item { margin-bottom: 14px; }
    #api label { display: block; font-size: 13px; font-weight: 600; color: var(--neutral-text-muted); margin-bottom: 6px; }

    /* Erro do B2C sempre ABAIXO do input (injetado antes do input no DOM).
       Default nos filhos = junto do input (order 2); label no topo; erro embaixo. */
    #api .entry-item, #api .attrEntry { display: flex; flex-direction: column; }
    #api .entry-item > *, #api .attrEntry > * { order: 2; }
    #api .entry-item > label, #api .attrEntry > label { order: 1; margin-bottom: 6px; }
    #api .entry-item > .error, #api .entry-item > .itemLevel,
    #api .attrEntry > .error, #api .attrEntry > .itemLevel { order: 3; margin-top: 6px; }

    /* Remove o marcador de lista <ul><li> que o B2C usa nos campos (bullet "•") */
    #api ul, #api ol, #api li, #api .attrEntry {
      list-style: none !important;
      margin-left: 0 !important;
      padding-left: 0 !important;
    }

    /* Esconde os help links "O que é isto?" do B2C (ruído no reset) */
    #api .helpLink, #api a.helpLink, #api .tiny a { display: none !important; }

    #api input[type="text"],
    #api input[type="email"],
    #api input[type="password"],
    #api input.textInput {
      width: 100%;
      padding: 11px 13px;
      font-size: 14px;
      color: var(--neutral-text);
      background: #fff;
      border: 1px solid var(--neutral-90);
      border-radius: 10px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #api input:focus { border-color: var(--brand-50); box-shadow: 0 0 0 3px rgba(253,114,54,0.15); }
    #api input::placeholder { color: var(--neutral-placeholder); }

    /* Botões primários: Continuar / Verificar / Enviar código */
    #api button,
    #api .buttons button,
    #api #continue,
    #api #emailVerificationControl_but_verify_code,
    #api #emailVerificationControl_but_send_code {
      width: 100%;
      padding: 11px;
      font-size: 14px; font-weight: 700;
      color: #fff;
      background: var(--brand-50);
      border: none; border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(253,114,54,0.25);
      transition: background .15s, transform .05s;
      margin-top: 6px;
    }
    #api button:hover, #api #continue:hover,
    #api #emailVerificationControl_but_verify_code:hover,
    #api #emailVerificationControl_but_send_code:hover { background: var(--brand-40); }
    #api button:active { transform: translateY(1px); }

    /* Botões secundários: reenviar código, alterar email, Cancelar */
    #api #emailVerificationControl_but_send_new_code,
    #api #emailVerificationControl_but_change_claims,
    #api #cancel {
      width: 100%;
      padding: 10px;
      font-size: 13.5px; font-weight: 600;
      color: var(--brand-50);
      background: #fff;
      border: 1px solid var(--brand-90);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: none;
      margin-top: 8px;
    }
    #api #cancel:hover,
    #api #emailVerificationControl_but_send_new_code:hover,
    #api #emailVerificationControl_but_change_claims:hover {
      background: var(--brand-99);
    }

    /* Mensagens de sucesso/verificação */
    #api .verificationInfoText, #api .verifying-modal { font-size: 13px; color: var(--neutral-subtle); }
    #api .error, #api .itemLevel .error, #api .pageLevel .error {
      color: #d33a2c; font-size: 12.5px; margin: 4px 0 0;
    }
    /* O B2C envolve o texto do erro num <p> com margin default do browser (gap grande) */
    #api .error p, #api .itemLevel p, #api .pageLevel p { margin: 0; line-height: 1.4; }

    /* Link "Cancelar" que o B2C às vezes coloca no topo */
    .cancel, a.cancel { color: var(--brand-50) !important; }
  </style>
</head>
<body>
  <div class="agl-wrap">
    <div class="agl-card">
      <div class="agl-mark">A</div>
      <!-- B2C injeta título dinâmico + formulário aqui -->
      <div id="api"></div>
    </div>
  </div>
</body>
</html>
