<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Agilean</title>
  <!--
    Página custom do Azure AD B2C para as telas SelfAsserted (reset de senha: verificação de
    email, nova senha; e afins). Diferente de unified.html: aqui o TÍTULO é dinâmico (vem do
    B2C — "Detalhes do Usuário", "Nova senha") então NÃO escondemos .heading/.intro.
    O B2C injeta o formulário em <div id="api">. Scripts custom não executam.
    Requisitos: HTTPS + CORS (allow b2clogin.com). DÉBITO: migrar pra blob/CDN.
  -->
  <style>
    :root {
      --brand-99: #FFF6EF;
      --brand-95: #FFF0E6;
      --brand-90: #FEDBC6;
      --brand-50: #FD7236;
      --brand-40: #F85D1A;
      --neutral-bg: #faf8f6;
      --neutral-text: #3d2e22;
      --neutral-text-muted: #5a4a3c;
      --neutral-subtle: #8c7a6b;
      --neutral-placeholder: #c4b5a5;
      --neutral-90: #e9e2db;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--neutral-text);
      background: linear-gradient(135deg, var(--brand-99), var(--brand-95));
    }

    /* Neutraliza o wrapper estreito/azul do template B2C */
    #panel, .container, [data-tenant-branding-background], [data-tenant-branding-background-color] {
      background: transparent !important;
      max-width: none !important;
      width: auto !important;
      box-shadow: none !important;
      border: none !important;
    }

    .agl-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .agl-card {
      width: 100%; max-width: 400px;
      background: #fff;
      border: 1px solid var(--neutral-90);
      border-radius: 18px;
      padding: 32px 32px 26px;
      box-shadow: 0 12px 40px rgba(61,46,34,0.10);
    }
    /* Logo real da Agilean (SVG no GitHub Pages) — cor natural (laranja),
       sem quadrado de fundo, maior. */
    .agl-mark {
      width: 88px; height: 88px; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .agl-mark img { width: 100%; height: 100%; object-fit: contain; }

    /* ===== Elementos injetados pelo B2C em #api ===== */
    #api { width: 100%; }

    /* Título/instrução DINÂMICOS do B2C — mantidos e estilizados */
    #api .heading { text-align: center; margin-bottom: 6px; }
    #api .heading h1, #api .heading h2 {
      font-size: 21px; font-weight: 800; color: var(--neutral-text); margin: 0;
    }
    #api .intro, #api .intro p {
      text-align: center; font-size: 13.5px; color: var(--neutral-subtle);
      margin: 0 auto 22px; max-width: 320px; line-height: 1.5;
    }

    #api .attr, #api .entry, #api .entry-item { width: 100%; }
    #api .entry-item { margin-bottom: 14px; }
    #api label { display: block; font-size: 13px; font-weight: 600; color: var(--neutral-text-muted); margin-bottom: 6px; }

    /* Erro do B2C sempre ABAIXO do input (injetado antes do input no DOM).
       Default nos filhos = junto do input (order 2); label no topo; erro embaixo. */
    #api .entry-item, #api .attrEntry { display: flex; flex-direction: column; }
    #api .entry-item > *, #api .attrEntry > * { order: 2; }
    #api .entry-item > label, #api .attrEntry > label { order: 1; margin-bottom: 6px; }
    #api .entry-item > .error, #api .entry-item > .itemLevel,
    #api .attrEntry > .error, #api .attrEntry > .itemLevel { order: 3; margin-top: 6px; }

    /* Remove o marcador de lista <ul><li> que o B2C usa nos campos (bullet "•") */
    #api ul, #api ol, #api li, #api .attrEntry {
      list-style: none !important;
      margin-left: 0 !important;
      padding-left: 0 !important;
    }

    /* Esconde os help links "O que é isto?" do B2C (ruído no reset) */
    #api .helpLink, #api a.helpLink, #api .tiny a { display: none !important; }

    #api input[type="text"],
    #api input[type="email"],
    #api input[type="password"],
    #api input.textInput {
      width: 100%;
      padding: 11px 13px;
      font-size: 14px;
      color: var(--neutral-text);
      background: #fff;
      border: 1px solid var(--neutral-90);
      border-radius: 10px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #api input:focus { border-color: var(--brand-50); box-shadow: 0 0 0 3px rgba(253,114,54,0.15); }
    #api input::placeholder { color: var(--neutral-placeholder); }

    /* Código de verificação (#emailVerificationCode) com aparência de caixinhas.
       O B2C injeta 1 input só (sem wrapper pra desenhar caixas atrás), então as
       caixas são o BACKGROUND do próprio input: 6 células via repeating-gradient
       + letter-spacing alinhando cada dígito sobre uma célula. Pitch = 46px
       (célula 38px + gap 8px); ajustar se desalinhar no cliente real. */
    #api #emailVerificationCode {
      box-sizing: border-box;
      width: 288px;
      max-width: 100%;
      height: 52px;
      border: none !important;
      border-radius: 0 !important;
      background-color: transparent !important;
      background-image: repeating-linear-gradient(
        90deg,
        var(--neutral-bg) 0, var(--neutral-bg) 38px,
        transparent 38px, transparent 46px
      );
      background-repeat: no-repeat;
      /* borda das células via outline não dá; usamos sombra por célula não é viável,
         então a célula é o fundo bege; o contorno vem do gradiente abaixo */
      box-shadow: none !important;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 800;
      font-size: 24px;
      line-height: 52px;
      letter-spacing: 24px;
      text-indent: 19px;
      padding: 0;
      color: var(--neutral-text);
      caret-color: var(--brand-50);
    }
    #api #emailVerificationCode:focus { box-shadow: none !important; border: none !important; }

    /* Botões primários (ação do passo): Verificar / Enviar código.
       #continue é rebaixado a secundário logo abaixo — na etapa de verificar
       email ele ainda "não faz sentido" (email não confirmado), então não deve
       competir visualmente com "Enviar código de verificação". */
    #api button,
    #api .buttons button,
    #api #emailVerificationControl_but_verify_code,
    #api #emailVerificationControl_but_send_code {
      width: 100%;
      padding: 11px;
      font-size: 14px; font-weight: 700;
      color: #fff;
      background: var(--brand-50);
      border: none; border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(253,114,54,0.25);
      transition: background .15s, transform .05s;
      margin-top: 6px;
    }
    #api button:hover,
    #api #emailVerificationControl_but_verify_code:hover,
    #api #emailVerificationControl_but_send_code:hover { background: var(--brand-40); }
    #api button:active { transform: translateY(1px); }

    /* #continue = secundário (outline). Id-selector vence o `#api button` acima.
       Sinaliza que não é a ação do passo atual (verificar email) sem escondê-lo. */
    #api #continue {
      background: #fff !important;
      color: var(--brand-50) !important;
      border: 1.5px solid var(--neutral-90) !important;
      box-shadow: none !important;
      font-weight: 600 !important;
    }
    #api #continue:hover { background: var(--brand-99) !important; }

    /* Botões secundários: reenviar código, alterar email, Cancelar */
    /* "Cancelar" não faz sentido no fluxo de convite (aborta o reset e volta
       pro app sem senha definida) — escondido. */
    #api #cancel { display: none !important; }

    #api #emailVerificationControl_but_send_new_code,
    #api #emailVerificationControl_but_change_claims {
      width: 100%;
      padding: 10px;
      font-size: 13.5px; font-weight: 600;
      color: var(--brand-50);
      background: #fff;
      border: 1px solid var(--brand-90);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: none;
      margin-top: 8px;
    }
    #api #cancel:hover,
    #api #emailVerificationControl_but_send_new_code:hover,
    #api #emailVerificationControl_but_change_claims:hover {
      background: var(--brand-99);
    }

    /* Mensagens de sucesso/verificação */
    #api .verificationInfoText, #api .verifying-modal { font-size: 13px; color: var(--neutral-subtle); }
    #api .error, #api .itemLevel .error, #api .pageLevel .error {
      color: #d33a2c; font-size: 12.5px; margin: 4px 0 0;
    }
    /* O B2C envolve o texto do erro num <p> com margin default do browser (gap grande) */
    #api .error p, #api .itemLevel p, #api .pageLevel p { margin: 0; line-height: 1.4; }

    /* Link "Cancelar" que o B2C às vezes coloca no topo */
    .cancel, a.cancel { color: var(--brand-50) !important; }
  </style>
</head>
<body>
  <div class="agl-wrap">
    <div class="agl-card">
      <div class="agl-mark"><img src="https://igoraraujov.github.io/agilean-b2c-pages/logo.svg" alt="Agilean" /></div>
      <!-- B2C injeta título dinâmico + formulário aqui -->
      <div id="api"></div>
    </div>
  </div>
</body>
</html>
